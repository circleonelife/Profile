<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="icon" href="favicon/favicon.ico" />
<title>Offline — Amit Ku Yadav</title>

<link rel="stylesheet" href="css/base.css">

<style>

/* ======================================================
   OFFLINE PAGE LAYOUT
====================================================== */

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px;
  text-align: center;
}

/* ======================================================
   CARD
====================================================== */

.offline-card {
  max-width: 720px;
  padding: 48px 36px;
  border-radius: 22px;

  backdrop-filter: blur(18px) saturate(160%);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--card-border-dark);

  box-shadow:
    0 20px 50px rgba(0,0,0,0.35),
    0 0 0 1px var(--brand-green-soft);
}

/* ======================================================
   TYPOGRAPHY
====================================================== */

.offline-card h1 {
  font-size: 2rem;
  margin-bottom: 18px;
}

.offline-card p {
  font-size: 0.95rem;
  max-width: 500px;
  margin: 0 auto 16px;
}

/* ======================================================
   ICON
====================================================== */

.offline-icon {
  font-size: 42px;
  margin-bottom: 18px;
  opacity: 0.8;
}

/* ======================================================
   ACTION BUTTONS
====================================================== */

.offline-actions {
  margin-top: 28px;
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-offline {
  padding: 12px 22px;
  border-radius: 999px;
  font-size: 0.85rem;
  text-decoration: none;
  border: 1px solid var(--brand-green);
  color: var(--brand-green);
  transition: all 0.25s ease;
}

.btn-offline:hover {
  background: var(--brand-green);
  color: #fff;
}

/* ======================================================
   PRIMARY BUTTON
====================================================== */

.btn-home {
  background: linear-gradient(
    135deg,
    var(--brand-green),
    var(--brand-orange)
  );

  color: #fff;
  border: none;
}

.btn-home:hover {
  transform: translateY(-2px);
}

/* ======================================================
   MOBILE
====================================================== */

@media (max-width: 768px) {

  .offline-card {
    padding: 36px 24px;
  }

}

</style>

</head>

<body class="theme-dark">

<div class="offline-card">

<div class="offline-icon">
  <img src="logo/day-logo.png" width="48">
</div>

<h1>You're Offline</h1>

<p>
It looks like your internet connection is unavailable.
You can still browse previously cached pages or return
to the homepage once you're connected again.
</p>

<div class="offline-actions">

<a href="/" class="btn-offline btn-home">
Return Home
</a>

<a href="/pages/social.html" class="btn-offline">
Social
</a>

<button id="retryBtn" class="btn-offline">
Retry Connection
</button>
<script>document.getElementById("retryBtn").addEventListener("click",function(){location.reload();});</script>

</div>

</div>

</body>
</html>
