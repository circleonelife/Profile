<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login · Amit Ku Yadav Personal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon/favicon.ico" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>

<body class="theme-dark auth-page">

<!-- Theme restore — runs before anything renders -->
<script>
try {
  var _t = localStorage.getItem("theme");
  if (_t) {
    document.body.classList.remove("theme-dark","theme-light");
    document.body.classList.add(_t);
  }
} catch(e) {}
</script>

<!-- Load auth module synchronously -->
<script src="/js/auth.js"></script>

<!-- Redirect immediately if already logged in -->
<script>
if (isAuthenticated()) {
  var _next = new URLSearchParams(window.location.search).get("next");
  window.location.replace(_next || "/pages/personal.html");
}
</script>

<div class="auth-card">

  <!-- Brand -->
  <a href="/" class="auth-brand">
    <img id="authLogo" src="/logo/night-logo.png" alt="Amit Ku Yadav" />
    <div>
      <div class="auth-brand-name">Amit Ku Yadav</div>
      <div class="auth-brand-sub">Personal Access</div>
    </div>
  </a>

  <!-- Tabs -->
  <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
    <button class="auth-tab active" id="tab-login"
      role="tab" aria-selected="true" aria-controls="panel-login">
      Login
    </button>
    <button class="auth-tab" id="tab-signup"
      role="tab" aria-selected="false" aria-controls="panel-signup">
      Sign Up
    </button>
  </div>

  <!-- LOGIN PANEL -->
  <div class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">

    <!-- Hint shown when no account exists yet -->
    <div class="auth-hint" id="noAccountHint" style="display:none;">
      <span>No account yet?</span>
      <button type="button" id="goSignupBtn">Create one →</button>
    </div>

    <form id="loginForm" novalidate autocomplete="on">

      <div class="auth-field">
        <label for="login-username">Username</label>
        <input id="login-username" name="username" type="text"
          placeholder="Enter your username"
          autocomplete="username" spellcheck="false" required />
      </div>

      <div class="auth-field">
        <label for="login-password">Password</label>
        <div class="pw-wrap">
          <input id="login-password" name="password" type="password"
            placeholder="Enter your password"
            autocomplete="current-password" required />
          <button type="button" class="pw-toggle" data-target="login-password"
            aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>

      <label class="auth-remember">
        <input type="checkbox" id="login-remember" />
        Remember me for 30 days
      </label>

      <button type="submit" class="auth-submit" id="loginBtn">Login</button>
      <div class="auth-status" id="loginStatus" role="alert" aria-live="polite"></div>

    </form>
  </div>

  <!-- SIGN UP PANEL -->
  <div class="auth-panel" id="panel-signup" role="tabpanel" aria-labelledby="tab-signup">
    <form id="signupForm" novalidate autocomplete="off">

      <div class="auth-field">
        <label for="signup-username">Choose Username</label>
        <input id="signup-username" name="username" type="text"
          placeholder="At least 3 characters"
          autocomplete="username" spellcheck="false" required />
      </div>

      <div class="auth-field">
        <label for="signup-password">Choose Password</label>
        <div class="pw-wrap">
          <input id="signup-password" name="password" type="password"
            placeholder="At least 6 characters"
            autocomplete="new-password" required />
          <button type="button" class="pw-toggle" data-target="signup-password"
            aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="pw-strength" id="pwStrengthBar" role="progressbar"
          aria-label="Password strength" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        </div>
      </div>

      <div class="auth-field">
        <label for="signup-confirm">Confirm Password</label>
        <div class="pw-wrap">
          <input id="signup-confirm" name="confirm" type="password"
            placeholder="Repeat your password"
            autocomplete="new-password" required />
          <button type="button" class="pw-toggle" data-target="signup-confirm"
            aria-label="Show password"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
      </div>

      <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
      <div class="auth-status" id="signupStatus" role="alert" aria-live="polite"></div>

    </form>
    <p class="auth-divider">Account is stored on this device only.</p>
  </div>

</div>

<script>
"use strict";

/* ── Logo sync ── */
(function() {
  var logo = document.getElementById("authLogo");
  if (!logo) return;
  var isDark = document.body.classList.contains("theme-dark");
  logo.src = isDark ? "/logo/night-logo.png" : "/logo/day-logo.png";
})();

/* ── Show "no account" hint on login tab if no users exist ── */
if (!hasAnyUser()) {
  var hint = document.getElementById("noAccountHint");
  if (hint) hint.style.display = "flex";
}

/* ── Tab switching ── */
var tabLogin   = document.getElementById("tab-login");
var tabSignup  = document.getElementById("tab-signup");
var panelLogin  = document.getElementById("panel-login");
var panelSignup = document.getElementById("panel-signup");

function activateTab(which) {
  var isLogin = which === "login";
  tabLogin.classList.toggle("active",  isLogin);
  tabSignup.classList.toggle("active", !isLogin);
  tabLogin.setAttribute("aria-selected",  String(isLogin));
  tabSignup.setAttribute("aria-selected", String(!isLogin));
  panelLogin.classList.toggle("active",  isLogin);
  panelSignup.classList.toggle("active", !isLogin);
}

tabLogin.addEventListener("click",  function() { activateTab("login"); });
tabSignup.addEventListener("click", function() { activateTab("signup"); });

var goSignup = document.getElementById("goSignupBtn");
if (goSignup) goSignup.addEventListener("click", function() { activateTab("signup"); });

/* ── Show / hide password ── */
document.querySelectorAll(".pw-toggle").forEach(function(btn) {
  btn.addEventListener("click", function() {
    var input = document.getElementById(btn.dataset.target);
    if (!input) return;
    var hidden = input.type === "password";
    input.type = hidden ? "text" : "password";
    btn.setAttribute("aria-label", hidden ? "Hide password" : "Show password");
    btn.innerHTML = hidden
      ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
      : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  });
});

/* ── Password strength ── */
var pwInput     = document.getElementById("signup-password");
var strengthBar = document.getElementById("pwStrengthBar");

pwInput.addEventListener("input", function() {
  var val   = pwInput.value;
  var score = 0;
  if (val.length >= 6)           score++;
  if (val.length >= 10)          score++;
  if (/[A-Z]/.test(val))         score++;
  if (/[0-9]/.test(val))         score++;
  if (/[^A-Za-z0-9]/.test(val))  score++;

  var pct = score * 20;
  strengthBar.style.width = pct + "%";
  strengthBar.setAttribute("aria-valuenow", pct);
  strengthBar.style.background =
    score <= 1 ? "#ff4d4d" :
    score <= 2 ? "#ff9900" :
    score <= 3 ? "#f0c040" :
                 "var(--brand-green)";
});

/* ── Helpers ── */
function setStatus(elId, msg, type) {
  var el = document.getElementById(elId);
  if (!el) return;
  el.textContent = msg;
  el.className = "auth-status " + (type || "");
}

function setLoading(btnId, loading, label) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spin"></span>Please wait…'
    : label;
}

function getNext() {
  return new URLSearchParams(window.location.search).get("next") ||
         "/pages/personal.html";
}

/* ── LOGIN FORM ── */
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  setStatus("loginStatus", "", "");
  setLoading("loginBtn", true, "Login");

  var username = document.getElementById("login-username").value;
  var password = document.getElementById("login-password").value;
  var remember = document.getElementById("login-remember").checked;

  login(username, password, remember).then(function(result) {
    if (result.ok) {
      setStatus("loginStatus", "✓ Login successful. Redirecting…", "success");
      setTimeout(function() {
        window.location.replace(getNext());
      }, 500);
    } else {
      setStatus("loginStatus", result.error, "error");
      setLoading("loginBtn", false, "Login");
    }
  }).catch(function(err) {
    console.error("[auth] login error:", err);
    setStatus("loginStatus", "Something went wrong. Please try again.", "error");
    setLoading("loginBtn", false, "Login");
  });
});

/* ── SIGN UP FORM ── */
document.getElementById("signupForm").addEventListener("submit", function(e) {
  e.preventDefault();
  setStatus("signupStatus", "", "");

  var username = document.getElementById("signup-username").value;
  var password = document.getElementById("signup-password").value;
  var confirm  = document.getElementById("signup-confirm").value;

  if (password !== confirm) {
    setStatus("signupStatus", "Passwords do not match.", "error");
    return;
  }

  setLoading("signupBtn", true, "Create Account");

  signup(username, password).then(function(result) {
    if (!result.ok) {
      setStatus("signupStatus", result.error, "error");
      setLoading("signupBtn", false, "Create Account");
      return;
    }
    setStatus("signupStatus", "✓ Account created! Logging you in…", "success");
    return login(username, password, false);
  }).then(function(loginResult) {
    if (!loginResult) return; /* already handled above */
    if (!loginResult.ok) {
      /* signup succeeded but auto-login failed — send to login tab */
      setStatus("signupStatus", "Account created. Please log in.", "success");
      setTimeout(function() { activateTab("login"); }, 1000);
      return;
    }
    setTimeout(function() {
      window.location.replace(getNext());
    }, 700);
  }).catch(function(err) {
    console.error("[auth] signup error:", err);
    setStatus("signupStatus", "Something went wrong. Please try again.", "error");
    setLoading("signupBtn", false, "Create Account");
  });
});
</script>

</body>
</html>
