<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f0a"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#046A38"/>
      <stop offset="100%" stop-color="#FF671F"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#046A38" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#046A38" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>
  <g stroke="#046A38" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/><line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/><line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/><line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/><line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/><line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Compass -->
  <g transform="translate(430, 50)" opacity="0.18">
    <circle cx="100" cy="110" r="88" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="100" cy="110" r="72" fill="none" stroke="#046A38" stroke-width="1" stroke-opacity="0.5"/>
    <circle cx="100" cy="110" r="8" fill="#046A38"/>
    <!-- Compass needle -->
    <polygon points="100,30 107,108 100,86 93,108" fill="#FF671F" fill-opacity="0.8"/>
    <polygon points="100,190 107,112 100,134 93,112" fill="#046A38" fill-opacity="0.6"/>
    <!-- Cardinal points -->
    <text x="100" y="22" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#FF671F" fill-opacity="0.6" text-anchor="middle">N</text>
    <text x="185" y="115" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#046A38" fill-opacity="0.6" text-anchor="middle">E</text>
    <text x="100" y="203" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#046A38" fill-opacity="0.6" text-anchor="middle">S</text>
    <text x="15" y="115" font-family="system-ui,sans-serif" font-size="14" font-weight="800" fill="#046A38" fill-opacity="0.6" text-anchor="middle">W</text>
  </g>
  <rect x="48" y="200" width="80" height="3" rx="2" fill="url(#accent)"/>
  <rect x="48" y="60" width="98" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="98" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
  <text x="97" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#046A38" text-anchor="middle" letter-spacing="1">LEADERSHIP</text>
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Leadership in</text>
  <text x="48" y="164" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">The Modern Era</text>
  <text x="48" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">Principles for lasting impact</text>
  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · MAR 2026</text>
  <rect x="0" y="350" width="640" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
