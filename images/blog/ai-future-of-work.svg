<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f0a"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#046A38"/>
      <stop offset="100%" stop-color="#FF671F"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#046A38" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#046A38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <g stroke="#046A38" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="60" x2="640" y2="60"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>

  <!-- Brain/circuit icon -->
  <g transform="translate(430, 80)" opacity="0.18">
    <circle cx="90" cy="100" r="80" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="90" cy="100" r="55" fill="none" stroke="#046A38" stroke-width="1.5"/>
    <line x1="10" y1="100" x2="170" y2="100" stroke="#046A38" stroke-width="1.5"/>
    <line x1="90" y1="20" x2="90" y2="180" stroke="#046A38" stroke-width="1.5"/>
    <circle cx="90" cy="100" r="8" fill="#046A38"/>
    <circle cx="40" cy="60" r="5" fill="#FF671F"/>
    <circle cx="140" cy="60" r="5" fill="#FF671F"/>
    <circle cx="40" cy="140" r="5" fill="#FF671F"/>
    <circle cx="140" cy="140" r="5" fill="#FF671F"/>
    <line x1="40" y1="60" x2="90" y2="100" stroke="#046A38" stroke-width="1"/>
    <line x1="140" y1="60" x2="90" y2="100" stroke="#046A38" stroke-width="1"/>
    <line x1="40" y1="140" x2="90" y2="100" stroke="#046A38" stroke-width="1"/>
    <line x1="140" y1="140" x2="90" y2="100" stroke="#046A38" stroke-width="1"/>
  </g>

  <!-- Accent bar -->
  <rect x="48" y="200" width="80" height="3" rx="2" fill="url(#accent)"/>

  <!-- Category -->
  <rect x="48" y="60" width="90" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="90" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
  <text x="93" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#046A38" text-anchor="middle" letter-spacing="1">TECHNOLOGY</text>

  <!-- Title -->
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">AI &amp; The</text>
  <text x="48" y="164" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Future of Work</text>

  <!-- Subtitle -->
  <text x="48" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">What no one is telling you</text>

  <!-- Author -->
  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · APR 2026</text>

  <!-- Bottom accent -->
  <rect x="0" y="350" width="640" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
