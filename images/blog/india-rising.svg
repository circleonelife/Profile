<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a05"/>
      <stop offset="100%" stop-color="#0d1a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#046A38"/>
      <stop offset="100%" stop-color="#FF671F"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FF671F" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#046A38" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- Rising arrow / chart lines -->
  <g transform="translate(390,50)" opacity="0.15">
    <polyline points="0,220 60,160 120,180 180,100 240,50" fill="none" stroke="#046A38" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="0" cy="220" r="4" fill="#046A38"/>
    <circle cx="60" cy="160" r="4" fill="#046A38"/>
    <circle cx="120" cy="180" r="4" fill="#046A38"/>
    <circle cx="180" cy="100" r="4" fill="#046A38"/>
    <circle cx="240" cy="50" r="6" fill="#FF671F"/>
    <!-- Vertical bars -->
    <rect x="10" y="200" width="30" height="20" fill="#046A38" rx="3"/>
    <rect x="70" y="150" width="30" height="70" fill="#046A38" rx="3"/>
    <rect x="130" y="170" width="30" height="50" fill="#046A38" rx="3"/>
    <rect x="190" y="90" width="30" height="130" fill="#046A38" rx="3"/>
    <rect x="220" y="40" width="30" height="180" fill="#FF671F" rx="3" opacity="0.7"/>
  </g>

  <rect x="48" y="195" width="80" height="3" rx="2" fill="url(#accent)"/>

  <rect x="48" y="60" width="100" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="100" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
  <text x="98" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#046A38" text-anchor="middle" letter-spacing="1">GEOPOLITICS</text>

  <text x="48" y="128" font-family="system-ui,sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="-0.5">India Rising</text>
  <text x="48" y="162" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#FF671F" letter-spacing="-0.2">Path to Global Superpower</text>

  <text x="48" y="220" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">Why the 21st century belongs to us</text>

  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · APR 2026</text>
  <rect x="0" y="350" width="640" height="10" fill="url(#accent)" opacity="0.6"/>
</svg>
