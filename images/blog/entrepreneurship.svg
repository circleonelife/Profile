    <line x1="28" y1="195" x2="182" y2="195" stroke="#046A38" stroke-width="2"/>
    <rect x="42" y="165" width="28" height="30" fill="none" stroke="#046A38" stroke-width="2"/>
    <rect x="80" y="135" width="28" height="60" fill="none" stroke="#046A38" stroke-width="2"/>
    <rect x="118" y="100" width="28" height="95" fill="none" stroke="#046A38" stroke-width="2"/>
    <rect x="156" y="60" width="28" height="135" fill="none" stroke="#FF671F" stroke-width="2"/>
    <!-- Rocket above last bar -->
    <path d="M170,55 L175,35 L180,55 Z" fill="none" stroke="#FF671F" stroke-width="2"/>
    <line x1="170" y1="55" x2="180" y2="55" stroke="#FF671F" stroke-width="1.5"/>
    <!-- Trend line -->
    <polyline points="56,165 94,135 132,100 170,60" fill="none" stroke="#FF671F" stroke-width="1.5" stroke-dasharray="5,3"/>
