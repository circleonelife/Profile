    <polygon points="100,18 128,35 128,68 100,85 72,68 72,35" fill="none" stroke="#FF671F" stroke-width="2"/>
    <!-- Bottom left hex -->
    <polygon points="57,108 85,125 85,158 57,175 29,158 29,125" fill="none" stroke="#046A38" stroke-width="2"/>
    <!-- Bottom right hex -->
    <polygon points="143,108 171,125 171,158 143,175 115,158 115,125" fill="none" stroke="#046A38" stroke-width="2"/>
    <!-- Connections -->
    <line x1="86" y1="68" x2="57" y2="108" stroke="#FF671F" stroke-width="1.5"/>
    <line x1="114" y1="68" x2="143" y2="108" stroke="#FF671F" stroke-width="1.5"/>
    <line x1="85" y1="142" x2="115" y2="142" stroke="#046A38" stroke-width="1"/>
    <!-- Center dots -->
    <circle cx="100" cy="52" r="6" fill="#FF671F"/>
    <circle cx="57" cy="142" r="6" fill="#046A38"/>
    <circle cx="143" cy="142" r="6" fill="#046A38"/>
