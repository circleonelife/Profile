  <rect x="48" y="200" width="80" height="3" rx="2" fill="url(#accent)"/>
  <rect x="48" y="60" width="102" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="102" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
