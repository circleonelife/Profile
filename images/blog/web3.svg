  <text x="48" y="164" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Decentralized Future</text>
  <text x="48" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">Separating promise from hype</text>
  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · MAR 2026</text>
