    <circle cx="100" cy="110" r="22" fill="none" stroke="#FF671F" stroke-width="2.5"/>
    <circle cx="100" cy="110" r="10" fill="#FF671F" fill-opacity="0.3"/>
    <!-- Surrounding community -->
    <circle cx="100" cy="35" r="14" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="165" cy="72" r="14" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="165" cy="148" r="14" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="100" cy="185" r="14" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="35" cy="148" r="14" fill="none" stroke="#046A38" stroke-width="2"/>
    <circle cx="35" cy="72" r="14" fill="none" stroke="#046A38" stroke-width="2"/>
    <!-- Connections to center -->
    <line x1="100" y1="49" x2="100" y2="88" stroke="#046A38" stroke-width="1.5"/>
    <line x1="152" y1="79" x2="120" y2="98" stroke="#046A38" stroke-width="1.5"/>
    <line x1="152" y1="141" x2="120" y2="122" stroke="#046A38" stroke-width="1.5"/>
    <line x1="100" y1="171" x2="100" y2="132" stroke="#046A38" stroke-width="1.5"/>
    <line x1="48" y1="141" x2="80" y2="122" stroke="#046A38" stroke-width="1.5"/>
    <line x1="48" y1="79" x2="80" y2="98" stroke="#046A38" stroke-width="1.5"/>
  </g>
  <rect x="48" y="200" width="80" height="3" rx="2" fill="url(#accent)"/>
  <rect x="48" y="60" width="98" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="98" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
  <text x="97" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#046A38" text-anchor="middle" letter-spacing="1">LEADERSHIP</text>
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Community</text>
  <text x="48" y="164" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Leadership</text>
  <text x="48" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">Core principles for modern India</text>
  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · MAR 2026</text>
  <rect x="0" y="350" width="640" height="10" fill="url(#accent)" opacity="0.6"/>
