<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f0a"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#046A38"/>
      <stop offset="100%" stop-color="#FF671F"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#046A38" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#046A38" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>
  <g stroke="#046A38" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/><line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/><line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/><line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/><line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/><line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- Hands holding / heart icon -->
  <g transform="translate(430, 50)" opacity="0.18">
    <!-- Heart -->
    <path d="M100,80 C100,80 58,55 58,90 C58,115 100,140 100,140 C100,140 142,115 142,90 C142,55 100,80 100,80 Z" fill="none" stroke="#FF671F" stroke-width="2.5"/>
    <!-- Two hands below -->
    <path d="M35,170 Q35,150 55,148 L85,148 Q90,140 100,140 Q110,140 115,148 L145,148 Q165,150 165,170 Q155,190 130,195 L100,200 L70,195 Q45,190 35,170 Z" fill="none" stroke="#046A38" stroke-width="2"/>
    <!-- India map simplified outline dots -->
    <circle cx="100" cy="110" r="5" fill="#046A38"/>
    <circle cx="85" cy="95" r="4" fill="#046A38"/>
    <circle cx="115" cy="95" r="4" fill="#046A38"/>
  </g>
  <rect x="48" y="200" width="80" height="3" rx="2" fill="url(#accent)"/>
  <rect x="48" y="60" width="66" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="66" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
  <text x="81" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#046A38" text-anchor="middle" letter-spacing="1">SOCIAL</text>
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">The Role of NGOs</text>
  <text x="48" y="164" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">in Modern India</text>
  <text x="48" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">Driving real grassroots change</text>
  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · FEB 2026</text>
  <rect x="0" y="350" width="640" height="10" fill="url(#accent)" opacity="0.6"/>
