    <line x1="100" y1="125" x2="100" y2="165" stroke="#046A38" stroke-width="1.5"/>
    <line x1="52" y1="112" x2="88" y2="120" stroke="#046A38" stroke-width="1"/>
    <line x1="52" y1="122" x2="88" y2="129" stroke="#046A38" stroke-width="1"/>
