<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050f0a"/>
      <stop offset="100%" stop-color="#0a1f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#046A38"/>
      <stop offset="100%" stop-color="#FF671F"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#046A38" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#046A38" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>
  <g stroke="#046A38" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="60" x2="640" y2="60"/><line x1="0" y1="120" x2="640" y2="120"/><line x1="0" y1="180" x2="640" y2="180"/><line x1="0" y1="240" x2="640" y2="240"/><line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/><line x1="240" y1="0" x2="240" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/><line x1="400" y1="0" x2="400" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/><line x1="560" y1="0" x2="560" y2="360"/>
  </g>
  <!-- CPU chip icon -->
  <g transform="translate(430, 50)" opacity="0.18">
    <rect x="50" y="50" width="105" height="105" rx="8" fill="none" stroke="#046A38" stroke-width="2.5"/>
    <rect x="65" y="65" width="75" height="75" rx="4" fill="none" stroke="#046A38" stroke-width="1.5"/>
    <!-- CPU pins left -->
    <line x1="30" y1="75" x2="50" y2="75" stroke="#046A38" stroke-width="2"/><line x1="30" y1="95" x2="50" y2="95" stroke="#046A38" stroke-width="2"/>
    <line x1="30" y1="115" x2="50" y2="115" stroke="#046A38" stroke-width="2"/><line x1="30" y1="135" x2="50" y2="135" stroke="#046A38" stroke-width="2"/>
    <!-- CPU pins right -->
    <line x1="155" y1="75" x2="175" y2="75" stroke="#046A38" stroke-width="2"/><line x1="155" y1="95" x2="175" y2="95" stroke="#046A38" stroke-width="2"/>
    <line x1="155" y1="115" x2="175" y2="115" stroke="#046A38" stroke-width="2"/><line x1="155" y1="135" x2="175" y2="135" stroke="#046A38" stroke-width="2"/>
    <!-- CPU pins top -->
    <line x1="80" y1="30" x2="80" y2="50" stroke="#046A38" stroke-width="2"/><line x1="103" y1="30" x2="103" y2="50" stroke="#046A38" stroke-width="2"/>
    <line x1="125" y1="30" x2="125" y2="50" stroke="#046A38" stroke-width="2"/>
    <!-- CPU pins bottom -->
    <line x1="80" y1="155" x2="80" y2="175" stroke="#046A38" stroke-width="2"/><line x1="103" y1="155" x2="103" y2="175" stroke="#046A38" stroke-width="2"/>
    <line x1="125" y1="155" x2="125" y2="175" stroke="#046A38" stroke-width="2"/>
    <!-- Inner chip detail -->
    <circle cx="102" cy="103" r="12" fill="#FF671F" fill-opacity="0.4"/>
    <rect x="82" y="85" width="18" height="4" rx="2" fill="#046A38" fill-opacity="0.6"/>
    <rect x="82" y="95" width="14" height="4" rx="2" fill="#046A38" fill-opacity="0.6"/>
  </g>
  <rect x="48" y="200" width="80" height="3" rx="2" fill="url(#accent)"/>
  <rect x="48" y="60" width="102" height="24" rx="12" fill="#046A38" fill-opacity="0.2"/>
  <rect x="48" y="60" width="102" height="24" rx="12" fill="none" stroke="#046A38" stroke-width="1"/>
  <text x="99" y="76" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#046A38" text-anchor="middle" letter-spacing="1">TECHNOLOGY</text>
  <text x="48" y="130" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Technology &amp;</text>
  <text x="48" y="164" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-0.5">Future Systems</text>
  <text x="48" y="225" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">Reshaping governance and society</text>
  <text x="48" y="322" font-family="system-ui,sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">AMIT KU YADAV · FEB 2026</text>
  <rect x="0" y="350" width="640" height="10" fill="url(#accent)" opacity="0.6"/>
